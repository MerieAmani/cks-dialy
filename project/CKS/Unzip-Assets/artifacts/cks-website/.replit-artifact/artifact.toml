kind = "web"
previewPath = "/"
title = "CKS Dialysis Website"
version = "1.0.0"
id = "artifacts/cks-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22005

[services.development]
run = "pnpm --filter @workspace/cks-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cks-website", "run", "build" ]
publicDir = "artifacts/cks-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22005"
BASE_PATH = "/"
